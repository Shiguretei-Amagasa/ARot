<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ARot proto (MindAR)</title>

  <!-- MindAR v1.2.5系: コア(mindar-image)とA-Frame拡張が1本に統合された構成 -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      background: black;
    }
    #start-ui {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.9); color: #00ffff; display: flex;
      justify-content: center; align-items: center; z-index: 9999;
      font-family: monospace; font-weight: bold; font-size: 1.2rem;
      cursor: pointer; text-shadow: 0 0 10px #00ffff;
      text-align: center; padding: 20px; box-sizing: border-box;
    }
  </style>
</head>
<body>

<div id="start-ui" onclick="this.style.display='none'; if(window.startAR) window.startAR();">
  ■ [TAP TO START ARot PROTO] ■
</div>

<!--
  MindARはAR.jsと違い、startボタンを押した瞬間にカメラ起動するのではなく、
  a-scene読み込み時点でmindar-imageコンポーネントが自動的にカメラ初期化を始める。
  startARは「サウンド初期化(AudioContext unlock)」と「TreasureEngine起動」専用にする。
-->
<a-scene
  mindar-image="imageTargetSrc: ARot_marker.mind; autoStart: true; uiScanning: yes; uiLoading: yes;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <canvas id="textCanvas" width="1024" height="512"></canvas>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

  <!--
    MindARのtargetIndex: 0 は、.mind生成時にアップロードした画像の順番に対応。
    今回はARot_marker.mindに1枚しか含めていない想定なのでindex 0固定。
    座標系: ターゲット画像の物理的な「幅」が1ユニットになる(正方形画像なら高さも1)。
    AR.js時代のtreasure-wrapper以下の数値(width:1.6など)は基本そのまま使い回せる。
  -->
  <a-entity id="treasure-marker" mindar-image-target="targetIndex: 0">

    <a-entity id="treasure-wrapper" scale="0 0 0" position="0 0 0">

      <a-box id="bottom-plate" width="1.6" height="0.04" depth="1" position="0 0.02 0" color="#2c2e3e"></a-box>

      <a-entity id="p-front" position="0 0 0.5"><a-box width="1.6" height="1" depth="0.04" position="0 0.5 0" color="#2c2e3e"></a-box></a-entity>
      <a-entity id="p-back" position="0 0 -0.5"><a-box width="1.6" height="1" depth="0.04" position="0 0.5 0" color="#2c2e3e"></a-box></a-entity>
      <a-entity id="p-left" position="-0.8 0 0"><a-box width="0.04" height="1" depth="1" position="0 0.5 0" color="#2c2e3e"></a-box></a-entity>
      <a-entity id="p-right" position="0.8 0 0"><a-box width="0.04" height="1" depth="1" position="0 0.5 0" color="#2c2e3e"></a-box></a-entity>
      <a-entity id="p-top" position="0 1 0">
        <a-box id="top-plate" width="1.6" height="0.04" depth="1" position="0 0.02 0" color="#3b3e53" material="transparent: true; opacity: 1"></a-box>
      </a-entity>

      <a-plane id="resultPlane" position="0 0.5 0" width="3" height="1.5" material="src: #textCanvas; transparent: true; opacity: 0" scale="0 0 0" rotation="0 0 0"></a-plane>

    </a-entity>
  </a-entity>

</a-scene>

<script>
function setDebug(msg) {
  console.log("[ARot]", msg);
}

setDebug("ページ読み込み完了\nA-Frame/MindAR 読み込み待ち...");

window.addEventListener("load", () => {
  setDebug(
    "A-Frame: " + (typeof AFRAME !== "undefined" ? "OK" : "NG(読み込み失敗)") +
    "\nマーカー画像認識待ち..."
  );
});

class SoundManager {
  constructor() { this.ctx = null; this.unlocked = false; }
  async init() {
    try {
      if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (this.ctx.state === 'suspended') await this.ctx.resume();
      this.unlocked = true;
      console.log("🔊 Web Audio 初期化完了");
    } catch(e) { console.warn("Audio init deferred:", e); }
  }
  scheduleTone(freq, type, startTimeOffset, duration, vol) {
    if (!this.unlocked || !this.ctx) return;
    const startTime = this.ctx.currentTime + startTimeOffset;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type; o.connect(g); g.connect(this.ctx.destination);
    o.frequency.setValueAtTime(freq, startTime);
    g.gain.setValueAtTime(0, startTime);
    g.gain.linearRampToValueAtTime(vol, startTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    o.start(startTime); o.stop(startTime + duration);
  }
  playAppear() { this.scheduleTone(400, 'sine', 0, 0.1, 0.08); this.scheduleTone(600, 'sine', 0.08, 0.15, 0.08); }
  playOpen() { this.scheduleTone(100, 'sawtooth', 0, 0.2, 0.15); this.scheduleTone(180, 'square', 0.05, 0.15, 0.1); }
  playResult(type) {
    if (type === "残念") {
      this.scheduleTone(280, 'triangle', 0, 0.2, 0.1); this.scheduleTone(220, 'triangle', 0.15, 0.4, 0.1);
    } else if (type === "5%OFF") {
      this.scheduleTone(523.25, 'sine', 0, 0.15, 0.1); this.scheduleTone(659.25, 'sine', 0.08, 0.15, 0.1); this.scheduleTone(783.99, 'sine', 0.16, 0.5, 0.1);
    } else {
      this.scheduleTone(523.25, 'sine', 0, 0.6, 0.08); this.scheduleTone(659.25, 'sine', 0.05, 0.6, 0.08); this.scheduleTone(783.99, 'sine', 0.1, 0.6, 0.08); this.scheduleTone(1046.50, 'sine', 0.15, 0.8, 0.1);
    }
  }
}

class TreasureEngine {
  constructor() {
    this.sound = new SoundManager();
    this.state = 'IDLE';
    this.ctx = null;
    this.canvasEl = document.querySelector("#textCanvas");

    this.config = {
      "残念":   { color: "#777777", scale: "0.9 0.9 0.9", rot: "0 0 0",   glow: 5,   soundType: "残念" },
      "5%OFF":  { color: "#1E90FF", scale: "1.3 1.3 1.3", rot: "0 0 2",   glow: 25,  soundType: "5%OFF" },
      "10%OFF": { color: "#FFD700", scale: "1.8 1.8 1.8", rot: "0 0 -6",  glow: 60,  soundType: "10%OFF" }
    };

    this.initEntities();
    this.bindAREvents();
    console.log("🛠️ TreasureEngine が初期化されました");
  }

  initEntities() {
    this.els = {
      scene: document.querySelector("a-scene"),
      marker: document.querySelector("#treasure-marker"),
      wrapper: document.querySelector("#treasure-wrapper"),
      pFront: document.querySelector("#p-front"),
      pBack: document.querySelector("#p-back"),
      pLeft: document.querySelector("#p-left"),
      pRight: document.querySelector("#p-right"),
      pTop: document.querySelector("#p-top"),
      topPlate: document.querySelector("#top-plate"),
      result: document.querySelector("#resultPlane")
    };
    this.initCanvasContext();
  }

  initCanvasContext() {
    if (this.canvasEl && !this.ctx) {
      this.ctx = this.canvasEl.getContext("2d");
    }
  }

  bindAREvents() {
    if (!this.els.marker) {
      setDebug("エラー: #treasure-marker 要素が見つかりません");
      return;
    }

    // MindARでは markerFound/markerLost ではなく targetFound/targetLost
    this.els.marker.addEventListener("targetFound", () => {
      setDebug("✅ マーカー検知！(targetFound)");
      this.triggerAppear();
    });

    this.els.marker.addEventListener("targetLost", () => {
      setDebug("マーカーロスト(targetLost)\n再度カメラを向けてください");
      // MindARはtargetLost時、IDLEに戻して再出現できるようにする
      if (this.state === 'READY_TO_OPEN') {
        this.state = 'IDLE';
        this.els.wrapper.setAttribute('scale', '0 0 0');
      }
    });

    document.body.addEventListener("click", () => {
      if (this.state === 'READY_TO_OPEN') {
        this.triggerOpen();
      }
    });
  }

  anim(el, id, prop, to, dur, easing) {
    return new Promise(resolve => {
      if(!el) return resolve();
      const attrName = `animation__${id}`;
      el.removeAttribute(attrName);
      setTimeout(() => {
        el.setAttribute(attrName, `property: ${prop}; to: ${to}; dur: ${dur}; easing: ${easing}`);
        el.addEventListener(`animationcomplete__${id}`, resolve, { once: true });
      }, 20);
    });
  }

  renderText(resultKey) {
    if (!this.ctx) this.initCanvasContext();
    const ctx = this.ctx;
    if (!ctx) return;

    const canvasEl = this.canvasEl;
    const cfg = this.config[resultKey];

    ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
    ctx.font = "bold 160px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = cfg.color;
    ctx.shadowBlur = cfg.glow;
    ctx.lineWidth = 12;
    ctx.strokeStyle = "#000000";
    ctx.strokeText(resultKey, canvasEl.width / 2, canvasEl.height / 2);
    ctx.fillStyle = "#ffffff";
    ctx.fillText(resultKey, canvasEl.width / 2, canvasEl.height / 2);

    const mesh = this.els.result.getObject3D('mesh');
    if (mesh && mesh.material.map) mesh.material.map.needsUpdate = true;
  }

  async triggerAppear() {
    if (this.state !== 'IDLE') return;
    this.state = 'APPEARING';
    this.sound.playAppear();
    await this.anim(this.els.wrapper, "pop1", "scale", "1.2 1.2 1.2", 180, "easeOutQuad");
    await this.anim(this.els.wrapper, "pop2", "scale", "0.9 0.9 0.9", 120, "easeOutQuad");
    await this.anim(this.els.wrapper, "pop3", "scale", "1 1 1", 90, "easeOutQuad");
    this.state = 'READY_TO_OPEN';
    setDebug("出現完了\n画面をタップして開封してください");
  }

  async triggerOpen() {
    this.state = 'OPENING';
    this.sound.playOpen();
    const keys = Object.keys(this.config);
    const resultKey = keys[Math.floor(Math.random() * keys.length)];
    const cfg = this.config[resultKey];

    this.renderText(resultKey);

    const boxPromise = Promise.all([
      this.anim(this.els.pFront, "open_f", "rotation", "90 0 0", 400, "easeOutBack"),
      this.anim(this.els.pBack,  "open_b", "rotation", "-90 0 0", 400, "easeOutBack"),
      this.anim(this.els.pLeft,  "open_l", "rotation", "0 0 90", 400, "easeOutBack"),
      this.anim(this.els.pRight, "open_r", "rotation", "0 0 -90", 400, "easeOutBack"),
      this.anim(this.els.pTop,   "open_t", "position", "0 2.5 0", 400, "easeOutQuad"),
      this.anim(this.els.topPlate, "fade_t", "material.opacity", "0", 350, "linear")
    ]);

    await new Promise(r => setTimeout(r, 150));
    this.sound.playResult(cfg.soundType);

    await Promise.all([
      boxPromise,
      this.anim(this.els.result, "show_s", "scale", cfg.scale, 700, "easeOutBack"),
      this.anim(this.els.result, "show_f", "material.opacity", "1", 400, "linear"),
      this.anim(this.els.result, "show_r", "rotation", cfg.rot, 700, "easeOutQuad"),
      this.anim(this.els.result, "show_p", "position", "0 1.8 0", 700, "easeOutBack")
    ]);
    this.state = 'DONE';
    setDebug("結果表示完了: " + resultKey);
  }
}

let engineInstance = null;
window.startAR = async function() {
  setDebug("サウンド初期化中...(カメラはMindARが自動起動済み)");
  if (!engineInstance) {
    engineInstance = new TreasureEngine();
    await engineInstance.sound.init();
  }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ARot proto</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    #start-ui {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.9); color: #00ffff; display: flex;
      justify-content: center; align-items: center; z-index: 9999;
      font-family: monospace; font-weight: bold; font-size: 1.2rem; 
      cursor: pointer; text-shadow: 0 0 10px #00ffff;
    }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">

<div id="start-ui">■ [TAP TO START ARot PROTO] ■</div>

<a-scene embedded 
         arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; canvas-will-read-frequently: true;" 
         renderer="alpha: true">
  
  <a-assets>
    <canvas id="textCanvas" width="1024" height="512"></canvas>
  </a-assets>

  <a-marker type="pattern" url="ARot_marker.patt" id="treasure-marker" emitevents="true">
    
    <a-entity id="treasure-wrapper" scale="0 0 0" position="0 0 0">
      
      <a-box id="bottom-plate" width="1.6" height="0.04" depth="1" position="0 0.02 0" color="#2c2e3e"></a-box>

      <a-entity id="p-front" position="0 0 0.5">
        <a-box width="1.6" height="1" depth="0.04" position="0 0.5 0" color="#2c2e3e"></a-box>
      </a-entity>

      <a-entity id="p-back" position="0 0 -0.5">
        <a-box width="1.6" height="1" depth="0.04" position="0 0.5 0" color="#2c2e3e"></a-box>
      </a-entity>

      <a-entity id="p-left" position="-0.8 0 0">
        <a-box width="0.04" height="1" depth="1" position="0 0.5 0" color="#2c2e3e"></a-box>
      </a-entity>

      <a-entity id="p-right" position="0.8 0 0">
        <a-box width="0.04" height="1" depth="1" position="0 0.5 0" color="#2c2e3e"></a-box>
      </a-entity>

      <a-entity id="p-top" position="0 1 0">
        <a-box id="top-plate" width="1.6" height="0.04" depth="1" position="0 0.02 0" color="#3b3e53" material="transparent: true; opacity: 1"></a-box>
      </a-entity>

      <a-plane id="resultPlane" 
               position="0 0.5 0" 
               width="3" height="1.5" 
               material="src: #textCanvas; transparent: true; opacity: 0" 
               scale="0 0 0" 
               rotation="0 0 0">
      </a-plane>

    </a-entity>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
// ==========================================
// 1. サウンドマネージャー
// ==========================================
class SoundManager {
  constructor() {
    this.ctx = null;
    this.unlocked = false;
  }
  async init() {
    try {
      if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (this.ctx.state === 'suspended') await this.ctx.resume();
      this.unlocked = true;
      console.log("🔊 Web Audio Context 初期化成功");
    } catch(e) {
      console.warn("⚠️ オーディオの初期化に失敗（スキップします）:", e);
    }
  }
  scheduleTone(freq, type, startTimeOffset, duration, vol) {
    if (!this.unlocked || !this.ctx) return;
    const startTime = this.ctx.currentTime + startTimeOffset;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type; o.connect(g); g.connect(this.ctx.destination);
    o.frequency.setValueAtTime(freq, startTime);
    g.gain.setValueAtTime(0, startTime);
    g.gain.linearRampToValueAtTime(vol, startTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    o.start(startTime); o.stop(startTime + duration);
  }
  playAppear() { this.scheduleTone(400, 'sine', 0, 0.1, 0.08); this.scheduleTone(600, 'sine', 0.08, 0.15, 0.08); }
